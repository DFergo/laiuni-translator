server {
    listen 80;
    server_name _;

    root /app/frontend/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # React SPA — fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache (Vite fingerprints filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check for Docker/monitoring
    location /nginx-health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # API proxy to FastAPI sidecar — SSE streaming enabled
    location /internal/ {
        proxy_pass http://127.0.0.1:8000;
        client_max_body_size 26m;  # 25MB file upload limit + overhead

        # CRITICAL: These headers are required for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # Long timeout for streaming responses
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
