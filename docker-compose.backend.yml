services:
  hrdd-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    # BACKEND_PORT is REQUIRED — deploy fails clearly if it is not set.
    # Host port for the admin panel + /health. The backend is not internet-facing
    # (pull-inverse): this is local/admin access only, never exposed via Cloudflared.
    ports:
      - "${BACKEND_PORT:?BACKEND_PORT is required — set the host port for the admin panel}:8000"
    volumes:
      # DATA_DIR = /app/data (Sprint 24 layout: config/, sessions/, campaigns/, deleted/).
      # Named volume (default — VPS/headless):
      - hrdd-data:/app/data
      # Bind mount alternative (local machine — files editable "a mano" in Finder):
      # comment the line above and use e.g.
      #   - /Users/you/hrdd-data:/app/data
    environment:
      - DEPLOYMENT_JSON_PATH=/app/config/deployment_backend.json

volumes:
  hrdd-data:
